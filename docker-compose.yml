version: "3.9"

# Production-like local stack:
#   - postgres        -> warehouse for taxi data (raw / staging / marts)
#   - airflow-meta    -> separate Postgres instance for Airflow metadata
#   - airflow-init    -> one-shot db migration + admin user creation
#   - airflow-web     -> webserver UI on :8080
#   - airflow-sched   -> scheduler executing the DAG
#   - dagster-web     -> Dagster UI on :3000 (uses dagster-daemon for schedules)
#   - dagster-daemon  -> sensor / scheduler tick loop

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR}
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__LOAD_EXAMPLES: ${AIRFLOW__CORE__LOAD_EXAMPLES}
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    PYTHONPATH: /opt/airflow/project:/opt/airflow
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/logs:/opt/airflow/logs
    - ./shared:/opt/airflow/project/shared
    - ./sql:/opt/airflow/project/sql
    - ./data:/opt/data
  depends_on:
    postgres:
      condition: service_healthy
    airflow-meta:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    container_name: taxi-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - taxi-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 10

  airflow-meta:
    image: postgres:15
    container_name: airflow-meta
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-meta-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com || true
    restart: "no"

  airflow-web:
    <<: *airflow-common
    container_name: airflow-web
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      retries: 10
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-sched:
    <<: *airflow-common
    container_name: airflow-sched
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  dagster-web:
    build:
      context: .
      dockerfile: dagster_project/Dockerfile
    container_name: dagster-web
    env_file: .env
    environment:
      DAGSTER_HOME: /opt/dagster/home
      PYTHONPATH: /opt/project
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w workspace.yaml
    working_dir: /opt/project/dagster_project
    ports:
      - "3000:3000"
    volumes:
      - ./shared:/opt/project/shared
      - ./sql:/opt/project/sql
      - ./dagster_project:/opt/project/dagster_project
      - ./data:/opt/data
      - dagster-home:/opt/dagster/home
    depends_on:
      postgres:
        condition: service_healthy

  dagster-daemon:
    build:
      context: .
      dockerfile: dagster_project/Dockerfile
    container_name: dagster-daemon
    env_file: .env
    environment:
      DAGSTER_HOME: /opt/dagster/home
      PYTHONPATH: /opt/project
    command: dagster-daemon run
    working_dir: /opt/project/dagster_project
    volumes:
      - ./shared:/opt/project/shared
      - ./sql:/opt/project/sql
      - ./dagster_project:/opt/project/dagster_project
      - ./data:/opt/data
      - dagster-home:/opt/dagster/home
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  taxi-pg-data:
  airflow-meta-data:
  dagster-home:
